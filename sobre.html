<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <title>Sobre mim — BKS Influencer</title>
  <style>
    /* small page-specific tweaks to ensure the top area shows the avatar with hamburger to the right */
    .about-main{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:16px;
      padding:calc(var(--topbar-height) + 20px) 20px 20px;
      text-align:center;
    }
    .about-hero{
      max-width:720px;
      width:100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      padding:18px;
      display:flex;
      gap:16px;
      align-items:center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border:1px solid rgba(140,0,197,0.06);
    }
    .about-avatar{
      width:96px;
      height:96px;
      border-radius:12px;
      object-fit:cover;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 6px 18px rgba(140,0,197,0.10);
      border:2px solid rgba(255,255,255,0.04);
      flex:0 0 96px;
    }
    .about-content{ text-align:left; }
    .about-title{ font-size:20px; font-weight:800; margin-bottom:6px; }
    .about-text{ color:rgba(255,255,255,0.92); font-size:14px; line-height:1.35; }
  </style>
</head>
<body class="about-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" loading="lazy" decoding="async" width="44" height="44" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main class="about-main" id="app">
    <div class="about-hero" role="region" aria-label="Sobre BKS">
      <img src="bks.png" alt="BKS avatar large" class="about-avatar" loading="lazy" decoding="async" width="96" height="96" />
      <div class="about-content">
        <div class="about-title">Sobre mim</div>
        <div class="about-text">BKS Influencer cria conteúdo e conecta marcas e criadores. Aqui você encontra informações sobre projetos, serviços e como trabalhar conosco.</div>
      </div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
