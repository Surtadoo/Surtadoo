<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <title>Formulários — BKS Influencer</title>
</head>
<body class="form-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main id="app">
    <h1 id="brand" aria-label="Formularios Staff/ Streamings">Formularios Staff/ Streamings</h1>
    <img src="bks.png" alt="BKS Influencer logo" class="main-avatar large-avatar" />
    <div class="buttons-row" role="group" aria-label="Opções">
      <button class="btn dominant" id="btn-staff">Staff</button>
      <button class="btn dominant" id="btn-streamings">Streamings</button>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
