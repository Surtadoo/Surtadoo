<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <!-- Preload main script and logo to reduce blocking -->
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <link rel="prefetch" href="streamings.html">
  <title>Formulários — BKS Influencer</title>
</head>
<body class="form-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main id="app">
    <h1 id="brand" aria-label="Formularios">Formularios</h1>
    <div id="brand-subtitle" aria-label="Staff e Streamings">Staff / Streamings</div>
    <img src="bks.png" alt="BKS Influencer logo" class="main-avatar large-avatar" loading="lazy" decoding="async" width="180" height="180" />
    <div class="buttons-col" role="group" aria-label="Opções">
      <button class="btn dominant" id="btn-staff">Staff</button>
      <div style="height:12px" aria-hidden="true"></div>
      <button class="btn dominant" id="btn-streamings">Streamings</button>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
