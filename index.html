<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <!-- Preload main script and logo to reduce blocking, keep light prefetch hints -->
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <link rel="prefetch" href="parcerias.html">
  <link rel="prefetch" href="streamings.html">
  <title>BKS Influencer</title>
</head>
<body>
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" loading="lazy" decoding="async" width="44" height="44" />
        <span class="sr-only">BKS</span>
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main id="app">
    <img src="bks.png" alt="BKS Influencer logo" class="main-avatar" loading="lazy" decoding="async" width="96" height="96" />
    <h1 id="brand" aria-label="BKS Influencer"></h1>
    <p class="desc">Criando conteúdo, parcerias e conexões — BKS Influencer.</p>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
