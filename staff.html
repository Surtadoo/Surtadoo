<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <!-- Preload main script and logo to reduce blocking -->
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <link rel="prefetch" href="formulario.html">
  <title>Formulario Staff — BKS Influencer</title>
</head>
<body class="form-page staff-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" loading="lazy" decoding="async" width="44" height="44" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main id="app">
    <div class="staff-card" role="region" aria-label="Formulário Staff">
      <img src="bks.png" alt="BKS avatar large" class="staff-avatar" loading="lazy" decoding="async" width="220" height="220" />
      <div class="staff-title">Formulario Staff</div>

      <form class="staff-questions" id="staffForm" autocomplete="off">
        <div class="question">
          <label for="realname">NOME REAL:</label>
          <input id="realname" name="realname" type="text" placeholder="Seu nome real" />
        </div>

        <div class="question">
          <label for="mention">MENÇÃO (@DISCORD):</label>
          <input id="mention" name="mention" type="text" placeholder="@seunome" />
        </div>

        <div class="question">
          <label for="age">IDADE:</label>
          <input id="age" name="age" type="text" placeholder="Idade" />
        </div>

        <div class="question">
          <label for="wasstaff">JA FOI STAFF: SE SIM ONDE:</label>
          <textarea id="wasstaff" name="wasstaff" placeholder="Descreva se já foi staff e onde"></textarea>
        </div>

        <div class="question">
          <label for="rules">CONHECE AS REGRAS DO NOSSO SERVIDOR:</label>
          <textarea id="rules" name="rules" placeholder="Sim / Não e comentários"></textarea>
        </div>

        <div class="question">
          <label for="why">OQUE TE LEVOU A QUERER SE TORNAR STAFF EM NOSSO SERVIDOR:</label>
          <textarea id="why" name="why" placeholder="Explique suas motivações"></textarea>
        </div>

        <div class="question">
          <label for="responsible">VOCÊ SE CONSIDERA UMA PESSOA RESPONSÁVEL?</label>
          <textarea id="responsible" name="responsible" placeholder="Explique brevemente"></textarea>
        </div>

        <div class="question">
          <label for="strengths">DIGA-ME 3 PONTOS FORTES SEU:</label>
          <textarea id="strengths" name="strengths" placeholder="Liste 3 pontos fortes"></textarea>
        </div>

        <div class="staff-actions">
          <button class="btn dominant" type="submit">Enviar Formulário</button>
        </div>
      </form>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
