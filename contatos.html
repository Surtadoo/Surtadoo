<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <title>Contatos — BKS Influencer</title>
  <style>
    /* small page-specific layout for the contatos page (three-bars removed) */
    .contact-main {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:calc(var(--topbar-height) + 20px) 20px 20px;
      text-align:center;
    }
    .contact-title{
      font-size: clamp(28px, 6.8vw, 42px);
      font-weight:800;
      margin-top:6px;
    }
    .contact-desc{
      max-width:520px;
      color:rgba(255,255,255,0.9);
      font-size:15px;
      line-height:1.35;
      margin-top:6px;
    }
    .contact-cta{
      margin-top:8px;
      width:min(260px,86vw);
    }

    /* thumbnail image above each contact section title */
    .contact-thumb{
      width:96px;
      height:96px;
      border-radius:12px;
      object-fit:cover;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 6px 18px rgba(140,0,197,0.10);
      border:2px solid rgba(255,255,255,0.04);
      display:block;
      margin:0 auto;
    }

    /* slightly smaller thumb for the support site section */
    .contact-thumb.small{
      width:80px;
      height:80px;
    }
  </style>
</head>
<body class="form-page contacts-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" loading="lazy" decoding="async" width="44" height="44" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main class="contact-main" id="app">


    <div class="contact-title" aria-hidden="false">Contatos</div>

    <div class="contact-desc">Aqui você encontra as formas de se conectar com a BKS Influencer — parcerias, dúvidas e suporte. Envie uma mensagem e responderemos o mais breve possível.</div>

    <!-- Suporte Criador with thumbnail -->
    <img src="bks.png" alt="Suporte Criador" class="contact-thumb" loading="lazy" decoding="async" width="96" height="96" />
    <div class="contact-title" style="margin-top:6px;font-size:20px;font-weight:800;">Suporte Criador</div>

    <div class="contact-cta" style="margin-top:8px;">
      <button class="btn dominant" 
           id="contact-action-site"
           onclick="window.location.href='https://api.whatsapp.com/send/?phone=45988352517&text&type=phone_number&app_absent=0'">
        Contato
      </button>
    </div>

    <div style="height:12px" aria-hidden="true"></div>

    <!-- Suporte Site with slightly smaller thumbnail -->
    <img src="bks.png" alt="Suporte Site" class="contact-thumb small" loading="lazy" decoding="async" width="80" height="80" />
    <div class="contact-title" style="margin-top:6px;font-size:20px;font-weight:800;">Suporte Site</div>

    <div class="contact-cta" style="margin-top:8px;">
      <button class="btn dominant" 
           id="contact-action-site"
           onclick="window.location.href='https://api.whatsapp.com/send/?phone=5521980204832&text&type=phone_number&app_absent=0'">
        Contato
      </button>
    </div>

  </main>

  <script src="script.js" defer></script>
  <script>
    // Simple action: open mailto or scroll to top as placeholder
    document.addEventListener('DOMContentLoaded', () => {
      const primary = document.getElementById('contact-action');
      if (primary) {
        primary.addEventListener('click', (e) => {
          e.preventDefault();
          const mail = 'mailto:contato@bksinfluencer.example';
          try { window.location.href = mail; } catch(e){ location.assign('index.html'); }
        });
      }

      const siteBtn = document.getElementById('contact-action-site');
      if (siteBtn) {
        siteBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const mail = 'mailto:suporte@bksinfluencer.example';
          try { window.location.href = mail; } catch(e){ location.assign('index.html'); }
        });
      }
    });
  </script>
</body>
</html>
