<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <!-- Preload main script and logo to reduce blocking -->
  <link rel="preload" href="script.js" as="script">
  <link rel="preload" as="image" href="bks.png">
  <link rel="prefetch" href="index.html">
  <title>Parcerias — BKS Influencer</title>
</head>
<body class="partners-page form-page">
  <header class="topbar" role="banner">
    <div class="tab">
      <div class="tab-left">
        <img src="bks.png" alt="BKS avatar" class="avatar" />
      </div>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav id="menu" class="menu" aria-hidden="true">
      <button class="menu-item btn" id="inicio">Início</button>
      <button class="menu-item btn" id="formularios">Formulários</button>
      <button class="menu-item btn" id="parcerias">Parcerias</button>
      <button class="menu-item btn" id="contatos">Contatos</button>
      <button class="menu-item btn" id="sobre">Sobre mim</button>
    </nav>
  </header>

  <main id="app">
    <h1 id="brand" aria-label="BKS Influencer"></h1>
    <div id="brand-parcerias" aria-label="Parcerias">Parcerias</div>

    <div class="staff-card" style="max-width:720px;margin-top:12px;">
      <!-- Example partner items: duplicate/replace as needed -->
      <div class="partner-list" style="display:flex;flex-direction:column;gap:12px;width:100%;">
        <div class="partner-item" style="display:flex;gap:12px;align-items:center;padding:10px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));">
          <img src="bks.png" alt="Parceiro A" loading="lazy" decoding="async" width="84" height="84" style="width:84px;height:84px;border-radius:10px;object-fit:cover;flex:0 0 84px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div style="font-weight:800;font-size:16px;">Parceiro A</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.86);">Descrição curta do parceiro A, o que faz e motivo da parceria.</div>
          </div>
          <div style="flex:0 0 auto;">
            <button class="btn dominant partner-visit" data-href="https://example.com/partner-a" style="min-width:100px;padding:10px 12px;font-size:14px;">Visita</button>
          </div>
        </div>

        <div class="partner-item" style="display:flex;gap:12px;align-items:center;padding:10px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));">
          <img src="bks.png" alt="Parceiro B" loading="lazy" decoding="async" width="84" height="84" style="width:84px;height:84px;border-radius:10px;object-fit:cover;flex:0 0 84px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div style="font-weight:800;font-size:16px;">Parceiro B</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.86);">Descrição curta do parceiro B — link direto para perfil ou serviço.</div>
          </div>
          <div style="flex:0 0 auto;">
            <button class="btn dominant partner-visit" data-href="https://example.com/partner-b" style="min-width:100px;padding:10px 12px;font-size:14px;">Visita</button>
          </div>
        </div>

        <!-- Add more partner items similarly -->
      </div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
